<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Camera MediaPipe PoC</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #f5f7fa;
        color: #263238;
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 28px;
      }

      video {
        width: 480px;
        max-width: 100%;
        border-radius: 8px;
        background: #d8dee9;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 14px;
        margin-right: 10px;
        background: #247b7b;
        color: white;
        cursor: pointer;
      }

      pre {
        padding: 16px;
        border-radius: 8px;
        background: #1f2933;
        color: #dce8ef;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Camera + MediaPipe PoC</h1>
      <p id="status">idle</p>
      <video id="video" autoplay playsinline muted></video>
      <p>
        <button id="start">Start Camera</button>
        <button id="stop">Stop Camera</button>
      </p>
      <pre id="output">{}</pre>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
